<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timo da Poet pastel ocean AI profile banner">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="45%" stop-color="#bae6fd"/>
      <stop offset="75%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0284c7" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 800 72px 'Segoe UI', Arial, sans-serif; fill: #075985; letter-spacing: 1px; }
      .sub { font: 700 25px 'Segoe UI', Arial, sans-serif; fill: #0369a1; }
      .mini { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0e7490; }
      .chip { fill: rgba(255,255,255,.70); stroke: rgba(14,165,233,.45); stroke-width: 2; }
      .bubble { fill: rgba(255,255,255,.55); stroke: rgba(14,165,233,.35); stroke-width: 2; }
      .float1 { animation: float1 4s ease-in-out infinite; transform-origin: center; }
      .float2 { animation: float2 5s ease-in-out infinite; transform-origin: center; }
      .float3 { animation: float3 3.5s ease-in-out infinite; transform-origin: center; }
      .waveMove { animation: waveMove 5s ease-in-out infinite alternate; }
      .spark { animation: twinkle 1.6s ease-in-out infinite alternate; transform-origin:center; }
      @keyframes float1 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes float2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
      @keyframes float3 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes waveMove { from { transform: translateX(-24px); } to { transform: translateX(24px); } }
      @keyframes twinkle { from { opacity: .35; transform: scale(.92); } to { opacity: 1; transform: scale(1.15); } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="36" fill="url(#bg)"/>

  <g class="float1">
    <circle class="bubble" cx="94" cy="72" r="18"/>
    <circle class="bubble" cx="150" cy="122" r="10"/>
    <circle class="bubble" cx="1045" cy="80" r="14"/>
    <circle class="bubble" cx="1110" cy="130" r="22"/>
  </g>
  <g class="float2">
    <circle class="bubble" cx="235" cy="265" r="13"/>
    <circle class="bubble" cx="990" cy="245" r="10"/>
    <circle class="bubble" cx="1080" cy="286" r="15"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="82" y="62" width="1036" height="215" rx="34" fill="rgba(255,255,255,.52)" stroke="rgba(255,255,255,.75)" stroke-width="2"/>
  </g>

  <text x="600" y="140" text-anchor="middle" class="title">Timo da Poet</text>
  <text x="600" y="185" text-anchor="middle" class="sub">AI Engineer • Chatbot Systems • VLM • OCR • Creative AI</text>

  <g transform="translate(205 218)">
    <rect class="chip" x="0" y="0" width="168" height="42" rx="21"/>
    <text x="84" y="27" text-anchor="middle" class="mini">Chatbot</text>
    <rect class="chip" x="188" y="0" width="132" height="42" rx="21"/>
    <text x="254" y="27" text-anchor="middle" class="mini">VLM</text>
    <rect class="chip" x="340" y="0" width="132" height="42" rx="21"/>
    <text x="406" y="27" text-anchor="middle" class="mini">OCR</text>
    <rect class="chip" x="492" y="0" width="190" height="42" rx="21"/>
    <text x="587" y="27" text-anchor="middle" class="mini">AI Product</text>
    <rect class="chip" x="702" y="0" width="152" height="42" rx="21"/>
    <text x="778" y="27" text-anchor="middle" class="mini">FastAPI</text>
  </g>

  <g class="spark">
    <path d="M930 104 l8 18 18 8 -18 8 -8 18 -8-18 -18-8 18-8z" fill="#ffffff" opacity=".9"/>
    <path d="M260 104 l6 14 14 6 -14 6 -6 14 -6-14 -14-6 14-6z" fill="#ffffff" opacity=".9"/>
  </g>

  <g class="waveMove" opacity=".88">
    <path d="M-80 315 C70 275, 160 360, 310 318 S555 275, 700 318 S955 360, 1120 318 S1350 275, 1440 318 L1440 420 L-80 420 Z" fill="url(#wave)"/>
  </g>
  <path d="M0 333 C120 303, 210 360, 355 332 S590 303, 742 332 S1010 360, 1200 326 L1200 360 L0 360 Z" fill="#e0f7ff" opacity=".70"/>
</svg>
