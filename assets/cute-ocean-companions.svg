<svg width="1100" height="190" viewBox="0 0 1100 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cute ocean monster companions animation">
  <defs>
    <linearGradient id="sea" x1="0" x2="1">
      <stop offset="0%" stop-color="#e0f7ff"/>
      <stop offset="55%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .base { fill:url(#sea); stroke:#7dd3fc; stroke-width:3; }
      .shadow { fill:#0ea5e9; opacity:.12; }
      .body1 { fill:#7dd3fc; stroke:#0284c7; stroke-width:3; }
      .body2 { fill:#a5f3fc; stroke:#0891b2; stroke-width:3; }
      .body3 { fill:#bfdbfe; stroke:#2563eb; stroke-width:3; }
      .belly { fill:#f0fbff; }
      .eye { fill:#075985; }
      .blush { fill:#f9a8d4; opacity:.7; }
      .bubble { fill:#fff; stroke:#7dd3fc; stroke-width:2; opacity:.78; }
      .floatA { animation: floatA 2.6s ease-in-out infinite; transform-origin:center; }
      .floatB { animation: floatB 3.1s ease-in-out infinite; transform-origin:center; }
      .floatC { animation: floatC 2.2s ease-in-out infinite; transform-origin:center; }
      .fin { animation: wiggle .7s ease-in-out infinite alternate; transform-origin:center; }
      .blink { animation: blink 3.4s step-end infinite; }
      @keyframes floatA { 0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)} }
      @keyframes floatB { 0%,100%{transform:translateY(-6px)}50%{transform:translateY(8px)} }
      @keyframes floatC { 0%,100%{transform:translateY(3px)}50%{transform:translateY(-10px)} }
      @keyframes wiggle { from { transform: rotate(-6deg); } to { transform: rotate(7deg); } }
      @keyframes blink { 0%,92%,100%{ transform: scaleY(1); } 95%{ transform: scaleY(.12); } }
    </style>
  </defs>
  <rect class="base" x="10" y="10" width="1080" height="170" rx="36"/>
  <g>
    <circle class="bubble" cx="78" cy="52" r="10"/>
    <circle class="bubble" cx="100" cy="95" r="6"/>
    <circle class="bubble" cx="982" cy="48" r="9"/>
    <circle class="bubble" cx="1028" cy="104" r="13"/>
    <circle class="bubble" cx="550" cy="35" r="7"/>
  </g>

  <g class="floatA" transform="translate(170 95)">
    <ellipse class="shadow" cx="0" cy="52" rx="58" ry="10"/>
    <ellipse class="body1" cx="0" cy="0" rx="55" ry="44"/>
    <ellipse class="belly" cx="0" cy="18" rx="30" ry="18"/>
    <path class="fin" d="M-54 -5 L-88 -24 L-72 15 Z" class="body1" fill="#7dd3fc" stroke="#0284c7" stroke-width="3"/>
    <path class="fin" d="M54 -5 L88 -24 L72 15 Z" fill="#7dd3fc" stroke="#0284c7" stroke-width="3"/>
    <circle class="eye blink" cx="-18" cy="-10" r="5"/>
    <circle class="eye blink" cx="18" cy="-10" r="5"/>
    <circle class="blush" cx="-30" cy="4" r="7"/>
    <circle class="blush" cx="30" cy="4" r="7"/>
    <path d="M-10 8 Q0 17 10 8" fill="none" stroke="#075985" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g class="floatB" transform="translate(380 96)">
    <ellipse class="shadow" cx="0" cy="52" rx="58" ry="10"/>
    <path class="body2" d="M-52 6 C-52 -34 -20 -56 16 -46 C50 -36 62 -2 44 28 C24 62 -28 56 -48 24 Z"/>
    <path d="M-12 -45 L4 -75 L20 -44" fill="#a5f3fc" stroke="#0891b2" stroke-width="3"/>
    <ellipse class="belly" cx="0" cy="20" rx="26" ry="17"/>
    <circle class="eye blink" cx="-17" cy="-10" r="5"/>
    <circle class="eye blink" cx="18" cy="-8" r="5"/>
    <path d="M-7 8 Q3 16 13 8" fill="none" stroke="#075985" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g class="floatC" transform="translate(600 94)">
    <ellipse class="shadow" cx="0" cy="54" rx="60" ry="10"/>
    <ellipse class="body3" cx="0" cy="0" rx="50" ry="48"/>
    <path d="M-40 -28 C-80 -56 -90 -10 -52 2" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
    <path d="M40 -28 C80 -56 90 -10 52 2" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
    <ellipse class="belly" cx="0" cy="20" rx="27" ry="19"/>
    <circle class="eye blink" cx="-16" cy="-12" r="5"/>
    <circle class="eye blink" cx="16" cy="-12" r="5"/>
    <path d="M-11 8 Q0 18 11 8" fill="none" stroke="#075985" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g class="floatA" transform="translate(820 96)">
    <ellipse class="shadow" cx="0" cy="52" rx="58" ry="10"/>
    <path class="body1" d="M-60 0 C-40 -48 38 -48 60 0 C44 42 -44 42 -60 0Z"/>
    <path d="M-33 -32 L-50 -62 L-18 -44" fill="#7dd3fc" stroke="#0284c7" stroke-width="3"/>
    <path d="M33 -32 L50 -62 L18 -44" fill="#7dd3fc" stroke="#0284c7" stroke-width="3"/>
    <ellipse class="belly" cx="0" cy="15" rx="32" ry="17"/>
    <circle class="eye blink" cx="-18" cy="-12" r="5"/>
    <circle class="eye blink" cx="18" cy="-12" r="5"/>
    <path d="M-10 6 Q0 15 10 6" fill="none" stroke="#075985" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
