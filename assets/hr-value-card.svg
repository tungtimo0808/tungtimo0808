<svg width="1100" height="220" viewBox="0 0 1100 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HR friendly value card">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#effcff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .card{fill:#ffffff;stroke:#bae6fd;stroke-width:3}
      .title{font:800 26px 'Segoe UI',Arial,sans-serif;fill:#075985}
      .body{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#0369a1}
      .num{font:900 42px 'Segoe UI',Arial,sans-serif;fill:#38bdf8}
      .float{animation:f 3s ease-in-out infinite;transform-origin:center}
      @keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    </style>
  </defs>
  <rect width="1100" height="220" rx="30" fill="url(#bg)" stroke="#7dd3fc" stroke-width="3"/>
  <g class="float">
    <rect class="card" x="45" y="42" width="300" height="136" rx="24"/>
    <text class="num" x="75" y="92">01</text>
    <text class="title" x="130" y="86">AI Product</text>
    <text class="body" x="75" y="124">Chatbot, API, database, webhook,</text>
    <text class="body" x="75" y="150">scheduler, deployment mindset.</text>
  </g>
  <g class="float" style="animation-delay:.4s">
    <rect class="card" x="400" y="42" width="300" height="136" rx="24"/>
    <text class="num" x="430" y="92">02</text>
    <text class="title" x="485" y="86">Vision AI</text>
    <text class="body" x="430" y="124">VLM, OCR, image understanding,</text>
    <text class="body" x="430" y="150">receipt extraction, diagnosis support.</text>
  </g>
  <g class="float" style="animation-delay:.8s">
    <rect class="card" x="755" y="42" width="300" height="136" rx="24"/>
    <text class="num" x="785" y="92">03</text>
    <text class="title" x="840" y="86">Business Value</text>
    <text class="body" x="785" y="124">Readable projects for HR, users,</text>
    <text class="body" x="785" y="150">and technical reviewers.</text>
  </g>
</svg>
